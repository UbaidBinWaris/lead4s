<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
/* Scoped component wrapper to prevent breaking Elementor styles */
.l4s-widget-wrapper {
  width: 100%;
  font-family: 'Inter', sans-serif;
  color: #e1e4e8;
}
.l4s-widget-wrapper * {
  box-sizing: border-box;
}

/* Master Glass Container */
.l4s-glass-dashboard {
  background: linear-gradient(145deg, rgba(23, 28, 40, 0.5) 0%, rgba(15, 18, 25, 0.5) 100%);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 30px;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.l4s-title-main {
  color: #a1aab6;
  letter-spacing: 1px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  margin-left: 5px;
}

/* Row 1 Layout */
.l4s-top-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 20px;
}

/* Common Panel Class */
.l4s-panel {
  background: rgba(30, 35, 45, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  padding: 24px;
  display: flex;
  flex-direction: column;
}

.l4s-panel-title {
  color: #e1e4e8;
  font-size: 15px;
  font-weight: 500;
  margin: 0 0 24px 0;
}

/* Chart Styles */
.l4s-chart-layout {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 40px;
  padding-left: 10px;
}

.l4s-donut-wrap {
  position: relative;
  width: 120px;
  height: 120px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.05));
}

.l4s-donut {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(
    #df8d51 0% 35%, 
    #696583 35% 60%, 
    #436ebd 60% 80%, 
    #53a9b9 80% 100%
  );
  position: absolute;
  top: 0; left: 0;
}

.l4s-donut-hole {
  position: absolute;
  width: 80px;
  height: 80px;
  background: #191e2b; /* solid color matching the composite background visually */
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.l4s-legend {
  display: flex;
  flex-direction: column;
  gap: 12px;
  font-size: 13px;
}

.l4s-legend-item {
  display: flex;
  align-items: center;
  gap: 20px;
}

.l4s-legend-left {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 90px;
  color: #a1aab6;
}

.l4s-legend-color {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.l4s-legend-val {
  color: #e1e4e8;
  font-weight: 500;
}

/* Stats Styles */
.l4s-stats-col {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.l4s-stat-panel {
  padding: 20px 24px;
  justify-content: center;
}
.l4s-stat-panel p {
  color: #a1aab6;
  font-size: 13px;
  margin: 0 0 8px 0;
}
.l4s-stat-panel h2 {
  font-size: 32px;
  font-weight: 600;
  margin: 0;
  color: #ffffff;
}

/* Bottom Map Styles */
.l4s-map-panel h3 {
  color: #a1aab6;
  font-size: 12px;
  letter-spacing: 1px;
  font-weight: 600;
  margin: 0 0 20px 0;
  text-transform: uppercase;
}

.l4s-map-area {
  position: relative;
  min-height: 220px; 
  border-radius: 8px;
  background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg') center/100% no-repeat;
  opacity: 0.6;
}

#l4sMapDiv {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: transparent !important;
}

.l4s-feed {
  margin-top: 24px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.l4s-feed p {
  margin: 0;
  color: #a1aab6;
}
.l4s-feed span {
  font-weight: 500;
}

.leaflet-container {
  background: transparent !important;
}

@media(max-width: 900px) {
  .l4s-top-row {
    grid-template-columns: 1fr;
  }
}
</style>

<div class="l4s-widget-wrapper">
  <div class="l4s-glass-dashboard">
    
    <div class="l4s-top-row">
      <!-- Left Panel -->
      <div class="l4s-panel">
        <h2 class="l4s-panel-title">Lead Volume by Industry</h2>
        <div class="l4s-chart-layout">
          <div class="l4s-donut-wrap">
            <div class="l4s-donut"></div>
            <div class="l4s-donut-hole"></div>
          </div>
          <div class="l4s-legend">
            <div class="l4s-legend-item">
              <div class="l4s-legend-left"><div class="l4s-legend-color" style="background:#df8d51;"></div> Solar</div>
              <div class="l4s-legend-val">35%</div>
            </div>
            <div class="l4s-legend-item">
              <div class="l4s-legend-left"><div class="l4s-legend-color" style="background:#696583;"></div> Insurance</div>
              <div class="l4s-legend-val">25%</div>
            </div>
            <div class="l4s-legend-item">
              <div class="l4s-legend-left"><div class="l4s-legend-color" style="background:#436ebd;"></div> Legal</div>
              <div class="l4s-legend-val">20%</div>
            </div>
            <div class="l4s-legend-item">
              <div class="l4s-legend-left"><div class="l4s-legend-color" style="background:#53a9b9;"></div> Home Imp.</div>
              <div class="l4s-legend-val">20%</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panels -->
      <div class="l4s-stats-col">
        <div class="l4s-panel l4s-stat-panel">
          <p>Avg. Transfer Rate:</p>
          <h2>72%</h2>
        </div>
        <div class="l4s-panel l4s-stat-panel">
          <p>New Appointments (MTD):</p>
          <h2>1,215</h2>
        </div>
      </div>
    </div>

    <!-- Bottom Panel (Map + Feed) -->
    <div class="l4s-panel l4s-map-panel">
      <h3>NETWORK ACTIVITY FEED</h3>
      <div class="l4s-map-area">
        <div id="l4sMapDiv"></div>
      </div>
    </div>
    
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
setTimeout(() => {
  if (typeof L !== 'undefined' && document.getElementById('l4sMapDiv')) {
    const map = L.map('l4sMapDiv', {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false
    }).setView([20, 0], 1);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    const points = [
      [34.05, -118.24, '#df8d51'],  // LA - Solar
      [25.76, -80.19, '#e2ba6d'],   // Miami - Insurance
      [40.71, -74.00, '#df8d51'],   // NYC - Legal
      [51.50, -0.12, '#53a9b9'],    // London
      [-33.86, 151.20, '#df8d51']   // Sydney
    ];

    points.forEach((point) => {
      const color = point[2];
      const icon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='width: 6px; height: 6px; background-color: " + color + "; border-radius: 50%; box-shadow: 0 0 8px " + color + ", 0 0 16px " + color + ";'></div>",
        iconSize: [6, 6],
        iconAnchor: [3, 3]
      });
      L.marker([point[0], point[1]], {icon: icon}).addTo(map);
    });
  }
}, 500);
</script>
